name: Build VST3 Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build VST3 Windows
    runs-on: windows-latest

    steps:
    # 1. Checkout the repository recursively to pull submodules
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. Configure CMake (Automatic generator detection uses the active Visual Studio version)
    - name: Configure CMake
      run: |
        if (Test-Path build) { Remove-Item -Recurse -Force build }
        cmake -B build -DCMAKE_BUILD_TYPE=Release

    # 3. Compile the plugin target
    - name: Build Plugin
      run: cmake --build build --config Release --parallel 4

    # 4. Extract ONLY the single, standalone .vst3 binary from the generated bundle
    - name: Extract Single VST3 File
      shell: powershell
      run: |
        Copy-Item -Path "build/tectonic_Artefacts/Release/VST3/Tectonic.vst3/Contents/x86_64-win/Tectonic.vst3" -Destination "Tectonic.vst3" -Force

    # 5. Upload ONLY the single, flat .vst3 file (no folders)
    - name: Upload VST3 File
      uses: actions/upload-artifact@v4
      with:
        name: Tectonic_Windows_VST3
        path: Tectonic.vst3
        if-no-files-found: error
